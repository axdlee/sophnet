model: qwen3.6-max-preview
label:
  zh_Hans: qwen3.6-max-preview
  en_US: qwen3.6-max-preview
model_type: llm
features:
  - tool-call
  - stream-tool-call
  - agent-thought
model_properties:
  mode: chat
  context_size: 256000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    min: 1
    max: 48000
    default: 8192
  - name: temperature
    use_template: temperature
    default: 0.6
  - name: top_p
    use_template: top_p
  - name: presence_penalty
    use_template: presence_penalty
  - name: response_format
    use_template: response_format
    options:
      - text
      - json_object
pricing:
  input: '7'
  output: '28'
  unit: '0.000001'
  currency: RMB
