model: qwen3.6-plus
label:
  zh_Hans: qwen3.6-plus
  en_US: qwen3.6-plus
model_type: llm
features:
  - tool-call
  - stream-tool-call
  - vision
  - agent-thought
model_properties:
  mode: chat
  context_size: 1000000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    min: 1
    max: 16384
    default: 2048
  - name: temperature
    use_template: temperature
    default: 0.6
  - name: top_p
    use_template: top_p
  - name: presence_penalty
    use_template: presence_penalty
  - name: response_format
    use_template: response_format
    options:
      - text
      - json_object
pricing:
  input: '8'
  output: '48'
  unit: '0.000001'
  currency: RMB
