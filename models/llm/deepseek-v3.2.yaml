model: DeepSeek-V3.2
label:
  zh_Hans: DeepSeek-V3.2
  en_US: DeepSeek-V3.2
model_type: llm
features:
  - tool-call
  - stream-tool-call
  - agent-thought
model_properties:
  mode: chat
  context_size: 128000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    min: 1
    max: 16000
    default: 8192
  - name: temperature
    use_template: temperature
    default: 0.6
  - name: top_p
    use_template: top_p
  - name: presence_penalty
    use_template: presence_penalty
pricing:
  input: '2'
  output: '3'
  unit: '0.000001'
  currency: RMB
