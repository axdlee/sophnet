model: Qwen3.5-397B-A17B
label:
  zh_Hans: Qwen3.5-397B-A17B
  en_US: Qwen3.5-397B-A17B
model_type: llm
features:
  - tool-call
  - stream-tool-call
  - vision
  - agent-thought
model_properties:
  mode: chat
  context_size: 262000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    min: 1
    max: 16384
    default: 2048
  - name: temperature
    use_template: temperature
    default: 0.6
  - name: top_p
    use_template: top_p
  - name: presence_penalty
    use_template: presence_penalty
  - name: response_format
    use_template: response_format
    options:
      - text
      - json_object
pricing:
  input: '3'
  output: '18'
  unit: '0.000001'
  currency: RMB
